services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaxflow
      POSTGRES_PASSWORD: vaxflow
      POSTGRES_DB: vaxflow
    ports:
      - "5432:5432"          # เปิดให้ backend แบบ local (npm run dev) เชื่อมได้
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaxflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8080"          # UI จัดการฐานข้อมูล: http://localhost:8081

  backend:
    build: ./backend
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: vaxflow
      PGPASSWORD: vaxflow
      PGDATABASE: vaxflow
      SEED_DIR: /seed
      PORT: 4000
      RESEED_TOKEN: vaxflow-reseed   # token ภายในสำหรับ retrainer เรียก /api/reseed
      IP_GEO: maxmind                # maxmind (offline) | ipapi (online ระดับเขต)
      GEOIP_DB: /geoip/GeoLite2-City.mmdb
    volumes:
      # mount ข้อมูล (read-only) ให้ backend seed ลง Postgres
      - ../data:/seed/data:ro
      - ./geoip:/geoip:ro            # วางไฟล์ GeoLite2-City.mmdb ไว้ที่ webapp/geoip/
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "4000:4000"

  # VaxFlow computation microservice (Python/FastAPI) — วางข้าง ๆ Node เดิม
  # รับผิดชอบ 3 โมดูล: Dynamic Expire / Predictive Matching / Multi-dose Pooling
  vaccine-engine:
    build: ../vaccine-engine
    environment:
      PORT: 8500
    ports:
      - "8500:8500"   # API docs: http://localhost:8500/docs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8500/engine/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"     # HTTP (redirect -> HTTPS)
      - "8443:443"    # HTTPS (self-signed cert)

volumes:
  pgdata:
