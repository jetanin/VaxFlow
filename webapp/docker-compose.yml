services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vacflow
      POSTGRES_PASSWORD: vacflow
      POSTGRES_DB: vacflow
    ports:
      - "5432:5432"          # เปิดให้ backend แบบ local (npm run dev) เชื่อมได้
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vacflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Mock HOSxP (MySQL) — แหล่งข้อมูลจริงต่อโรงพยาบาล (per-hospital vial-level)
  # VacFlow backend มา fetch ผ่าน view (vacflow_ro) แทนการ seed จาก CSV ตรง ๆ
  mock-his:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: mock_hosxp
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - ../mock-his/init:/docker-entrypoint-initdb.d:ro   # schema+seed+views (รันครั้งแรก)
      - mockhis_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-prootpw"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    profiles: ["debug"]      # เครื่องมือ debug — start ด้วย: docker compose --profile debug up -d
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8081:8080"          # UI จัดการฐานข้อมูล: http://localhost:8081

  backend:
    build: ./backend
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: vacflow
      PGPASSWORD: vacflow
      PGDATABASE: vacflow
      SEED_DIR: /seed
      PORT: 4000
      JWT_SECRET: ${JWT_SECRET:-vacflow-dev-secret-change-me}   # ตั้งใน .env สำหรับ prod
      RESEED_TOKEN: ${RESEED_TOKEN:-vacflow-reseed}   # token ภายในสำหรับ retrainer เรียก /api/reseed
      IP_GEO: maxmind                # maxmind (offline) | ipapi (online ระดับเขต)
      GEOIP_DB: /geoip/GeoLite2-City.mmdb
      # Mock HOSxP — fetch โดเมนวัคซีนต่อ รพ. (ไม่ตั้ง = fallback อ่าน CSV)
      HIS_DB_HOST: mock-his
      HIS_DB_PORT: "3306"
      HIS_DB_USER: vacflow_ro        # read-only — อ่านได้เฉพาะ view ที่ตัด PII
      HIS_DB_PASS: CHANGE_ME_strong_pw
      HIS_DB_NAME: mock_hosxp
      ENGINE_URL: http://vaccine-engine:8500   # Predictive Matching Engine (LP transshipment)
    volumes:
      # mount ข้อมูล (read-only) ให้ backend seed ลง Postgres
      - ../data:/seed/data:ro
      - ./geoip:/geoip:ro            # วางไฟล์ GeoLite2-City.mmdb ไว้ที่ webapp/geoip/
    depends_on:
      db:
        condition: service_healthy
      mock-his:
        condition: service_started   # backend มี waitForHis retry เอง (init ครั้งแรกนาน)
      vaccine-engine:
        condition: service_started   # ใช้ /engine/match (best-effort — ล่มก็ fallback CSV)
    ports:
      - "4000:4000"

  # VacFlow computation microservice (Python/FastAPI) — วางข้าง ๆ Node เดิม
  # รับผิดชอบ 3 โมดูล: Dynamic Expire / Predictive Matching / Multi-dose Pooling
  vaccine-engine:
    build: ../vaccine-engine
    environment:
      PORT: 8500
    ports:
      - "8500:8500"   # API docs: http://localhost:8500/docs
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8500/engine/health').status==200 else 1)\""]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8090:80"     # HTTP (8080 ชนกับ ApplicationWebServer บน host → ใช้ 8090)
      - "8443:443"    # HTTPS (self-signed cert)

  # เทรน/คำนวณใหม่ตามตารางเวลา (ดีฟอลต์ 01:00 ทุกวัน) — รัน pipeline-as-code แล้วสั่ง reseed
  retrainer:
    build: ../retrainer
    profiles: ["train"]             # งานหนัก/รายวัน — start ด้วย: docker compose --profile train up -d
    cpus: "8.0"                     # จำกัด CPU (RF/MLP/Optuna ยังใช้ CPU) — มี 32 คอร์ -> ใช้ ≤8
    # GPU: XGBoost ใช้ CUDA ได้ (pipeline.train probe เอง · ตัวอื่นยังเป็น CPU) — ต้องมี nvidia runtime
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      TZ: Asia/Bangkok
      RUN_AT: "01:00"               # เวลาเทรนรายวัน (HH:MM ตามเวลาไทย)
      BACKEND_URL: http://backend:4000
      RESEED_TOKEN: ${RESEED_TOKEN:-vacflow-reseed}  # ต้องตรงกับ backend.RESEED_TOKEN
      VACFLOW_NOW: "2026-06-26T08:00:00+07:00"   # time anchor เดียว (P4) — ตั้งเป็นวันจริงได้
      VACFLOW_TRAIN: "1"            # 1 = รัน ML benchmark (GPU) ด้วย · 0 = เฉพาะ pipeline หลัก
      VACFLOW_MODELS: XGBoost       # ML benchmark เทรนเฉพาะ XGBoost (GPU/CUDA) — เร็ว · ว่าง=ครบ
      VACFLOW_N_TRIALS: "40"        # GPU เร็ว → จูน Optuna ได้มากขึ้น (รันมือใช้ดีฟอลต์ 25)
      # จำกัด thread ของ BLAS/XGBoost/LightGBM ให้สอดคล้องลิมิต CPU (กัน oversubscribe)
      OMP_NUM_THREADS: "8"
      OPENBLAS_NUM_THREADS: "8"
      MKL_NUM_THREADS: "8"
      NUMEXPR_NUM_THREADS: "8"
      # RUN_ON_START: "1"           # เปิดเพื่อเทรนทันทีตอนสตาร์ต (debug)
    volumes:
      - ..:/work                    # โค้ด+ข้อมูล (notebooks เขียน outputs ลง data/)
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  mockhis_data:
