name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── lint + unit tests (เบา ไม่ต้องมี DB) ──
  lint-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: { python-version: "3.11" }
      - name: Ruff lint (python)
        run: |
          pip install ruff
          ruff check vaccine-engine scripts retrainer || true   # report-only ช่วงเริ่ม

      - name: Engine unit tests (pytest)
        working-directory: vaccine-engine     # tests import `from modules ...`
        run: |
          pip install -r requirements.txt pytest numpy scipy
          pytest tests -q

      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Backend unit tests (jest)
        working-directory: webapp/backend
        run: |
          npm install
          npm test          # api.test จะข้ามเองถ้า API ไม่ขึ้น เหลือ unit ล้วน

      - name: Frontend build
        working-directory: webapp/frontend
        run: |
          npm install
          npm run build

  # ── integration: ยกสแต็กจริง (db + mock-his + engine + backend) แล้วยิง API ──
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bring up stack (เฉพาะที่จำเป็น)
        run: |
          docker compose -f webapp/docker-compose.yml up -d --build db mock-his vaccine-engine backend
      - name: Wait for backend health
        run: |
          for i in $(seq 1 60); do
            if curl -fs http://localhost:4000/api/health >/dev/null; then echo "up"; exit 0; fi
            sleep 4
          done
          echo "backend ไม่ขึ้น"; docker compose -f webapp/docker-compose.yml logs backend; exit 1
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Run API integration tests
        working-directory: webapp/backend
        env:
          API_URL: http://localhost:4000
        run: |
          npm install
          npx jest __tests__/api.test.js --runInBand
      - name: Teardown
        if: always()
        run: docker compose -f webapp/docker-compose.yml down -v
